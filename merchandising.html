<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>العروض والمجموعات — الأمراء</title>
<link rel="icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --bg:#f8fafc;
    --card:#fff; --brand:#4f46e5; --accent:#e8490f; --ok:#16a34a; --danger:#dc2626;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
       font-family:Alexandria,system-ui,sans-serif;font-size:14px;line-height:1.7}
  .wrap{max-width:1080px;margin:0 auto;padding:20px 16px 80px}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:12px;
       padding:16px 0;border-bottom:1px solid var(--line);margin-bottom:22px;flex-wrap:wrap}
  h1{font-size:20px;margin:0;font-weight:700}
  h2{font-size:16px;margin:0 0 4px;font-weight:700}
  .sub{color:var(--muted);font-size:12.5px;margin:0}
  a.back{color:var(--brand);font-size:13px;text-decoration:none}
  a.back:hover{text-decoration:underline}

  .tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
  .tab{border:1px solid var(--line);background:#fff;border-radius:99px;padding:8px 18px;
       font:inherit;font-size:13px;cursor:pointer;color:var(--muted)}
  .tab.on{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:600}

  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;
        padding:18px;margin-bottom:14px}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row>*{flex:1;min-width:150px}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
  input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;
        padding:9px 11px;font:inherit;font-size:13.5px;background:#fff;color:var(--ink)}
  input:focus,select:focus{outline:2px solid var(--brand);outline-offset:1px;border-color:transparent}
  .field{margin-bottom:12px}

  button{font:inherit;cursor:pointer;border-radius:8px;border:1px solid transparent;
         padding:9px 16px;font-size:13.5px;font-weight:600}
  .btn-primary{background:var(--ink);color:#fff}
  .btn-primary:hover{background:var(--brand)}
  .btn-ghost{background:#fff;border-color:var(--line);color:var(--ink)}
  .btn-ghost:hover{background:var(--bg)}
  .btn-danger{background:#fff;border-color:#fecaca;color:var(--danger)}
  .btn-danger:hover{background:#fef2f2}
  button:disabled{opacity:.5;cursor:not-allowed}

  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;
        padding:3px 10px;border-radius:99px;background:#f1f5f9;color:var(--muted)}
  .pill.on{background:#dcfce7;color:var(--ok)}
  .pill.off{background:#fee2e2;color:var(--danger)}
  .pill.sale{background:#ffedd5;color:var(--accent)}

  .picker{border:1px solid var(--line);border-radius:8px;max-height:260px;overflow:auto;background:#fff}
  .pick-row{display:flex;align-items:center;gap:10px;padding:8px 11px;border-bottom:1px solid var(--line)}
  .pick-row:last-child{border-bottom:none}
  .pick-row:hover{background:var(--bg)}
  .pick-row input[type=checkbox]{width:16px;height:16px;flex-shrink:0;margin:0}
  .pick-name{flex:1;font-size:13px}
  .pick-meta{font-size:11.5px;color:var(--muted);white-space:nowrap}

  .chosen{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .chip{display:inline-flex;align-items:center;gap:6px;background:#eef2ff;color:var(--brand);
        border-radius:99px;padding:4px 6px 4px 11px;font-size:12px}
  .chip button{background:none;border:none;color:inherit;padding:0 4px;font-size:14px;line-height:1}

  .head-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .actions{display:flex;gap:8px;flex-wrap:wrap}
  .muted{color:var(--muted);font-size:12.5px}
  .empty{text-align:center;color:var(--muted);padding:34px 12px;font-size:13px}
  .note{background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:8px;
        padding:11px 13px;font-size:12.5px;margin-bottom:14px}
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:99;
        background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;
        display:none;box-shadow:0 12px 30px -12px rgba(0,0,0,.5);max-width:90vw}
  #toast.err{background:var(--danger)}
  .center{text-align:center;padding:60px 20px}
  .spin{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--brand);
        border-radius:99px;animation:sp .7s linear infinite;margin:0 auto 12px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1>العروض والمجموعات</h1>
      <p class="sub">تحكّم في اللي بيتعرض على الموقع — من غير ما تحتاج مبرمج</p>
    </div>
    <a class="back" href="products.html">→ رجوع للمنتجات</a>
  </header>
  <div id="app"><div class="center"><div class="spin"></div><p class="muted">جارٍ التحميل…</p></div></div>
</div>
<div id="toast"></div>

<script>
const SUPABASE_URL = "https://mjetglnmivwphxyzflsz.supabase.co";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qZXRnbG5taXZ3cGh4eXpmbHN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NTcwODgsImV4cCI6MjA5NjQzMzA4OH0.X6Rvxo4owPcBwE4HqXLm5fuPDSdEo8PV9oBV-bHsGrg";

/* Reuse the session the POS already established on this origin, so the
   owner isn't asked to sign in twice. Scans for supabase-js's default
   key shape rather than hard-coding it. */
function accessToken(){
  try{
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(/^sb-.*-auth-token$/.test(k)){
        const v = JSON.parse(localStorage.getItem(k));
        if(v && v.access_token) return v.access_token;
      }
    }
  }catch(e){}
  return null;
}

async function rpc(fn, args){
  const tok = accessToken();
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      apikey: ANON_KEY,
      Authorization: `Bearer ${tok || ANON_KEY}`
    },
    body: JSON.stringify(args||{})
  });
  const txt = await res.text();
  let data=null; try{ data = txt?JSON.parse(txt):null; }catch(e){ data = txt; }
  if(!res.ok) throw new Error((data && (data.message||data.hint)) || `HTTP ${res.status}`);
  return data;
}

let S = { tab:"collections", data:null, editC:null, editB:null, busy:false };
const $ = s => document.querySelector(s);
const esc = s => String(s??"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const money = n => new Intl.NumberFormat("ar-EG",{style:"currency",currency:"EGP",maximumFractionDigits:2}).format(Number(n)||0);
const dIn = t => t ? new Date(t).toISOString().slice(0,10) : "";

function toast(msg, err){
  const t=$("#toast"); t.textContent=msg; t.className=err?"err":"";
  t.style.display="block"; clearTimeout(t._h);
  t._h=setTimeout(()=>t.style.display="none", err?5200:2600);
}

async function load(){
  try{
    S.data = await rpc("shop_fn_admin_merch",{});
    render();
  }catch(e){
    $("#app").innerHTML = `<div class="card"><h2>مش قادر أفتح البيانات</h2>
      <p class="muted">${esc(e.message)}</p>
      <p class="muted">لو الرسالة بتقول <code>owner only</code>، افتح <a href="login.html">صفحة الدخول</a>
      وسجّل دخول بحساب المالك، وبعدين ارجع للصفحة دي.</p></div>`;
  }
}

/* ── product picker shared by collections and bundles ── */
function picker(selected, onToggle, idPrefix){
  const q = (S["q_"+idPrefix]||"").trim();
  const list = S.data.products.filter(p=>p.is_published && (!q || p.name.includes(q)));
  return `
    <input placeholder="ابحث باسم المنتج…" value="${esc(q)}"
      oninput="S.q_${idPrefix}=this.value;render()" style="margin-bottom:8px">
    <div class="picker">
      ${list.length? list.map(p=>`
        <label class="pick-row">
          <input type="checkbox" ${selected.includes(p.id)?"checked":""}
                 onchange="${onToggle}('${p.id}')">
          <span class="pick-name">${esc(p.name)}</span>
          <span class="pick-meta">${money(p.price)}${Number(p.live_pct)>0?` · -${Math.round(p.live_pct)}%`:""}</span>
        </label>`).join("")
        : `<div class="empty">مفيش منتجات منشورة مطابقة</div>`}
    </div>`;
}

function collectionsTab(){
  const cs = S.data.collections;
  if(S.editC){
    const c = S.editC;
    const manual = c.kind==="manual";
    return `<div class="card">
      <h2>${c.id?"تعديل مجموعة":"مجموعة جديدة"}</h2>
      <div class="row">
        <div class="field"><label>العنوان بالعربي</label>
          <input value="${esc(c.title_ar)}" oninput="S.editC.title_ar=this.value"></div>
        <div class="field"><label>العنوان بالإنجليزي</label>
          <input value="${esc(c.title_en)}" oninput="S.editC.title_en=this.value"></div>
      </div>
      <div class="row">
        <div class="field"><label>وصف صغير (عربي)</label>
          <input value="${esc(c.subtitle_ar||"")}" oninput="S.editC.subtitle_ar=this.value"></div>
        <div class="field"><label>وصف صغير (إنجليزي)</label>
          <input value="${esc(c.subtitle_en||"")}" oninput="S.editC.subtitle_en=this.value"></div>
      </div>
      <div class="row">
        <div class="field"><label>إزاي تتملي؟</label>
          <select onchange="S.editC.kind=this.value;render()">
            <option value="manual" ${manual?"selected":""}>أنا أختار المنتجات بنفسي</option>
            <option value="best_sellers" ${c.kind==="best_sellers"?"selected":""}>تلقائي — الأكثر مبيعًا فعليًا</option>
            <option value="newest" ${c.kind==="newest"?"selected":""}>تلقائي — الأحدث</option>
            <option value="discounted" ${c.kind==="discounted"?"selected":""}>تلقائي — كل اللي عليه خصم</option>
          </select></div>
        <div class="field"><label>الترتيب على الصفحة</label>
          <input type="number" value="${c.sort||0}" oninput="S.editC.sort=this.value"></div>
        <div class="field"><label>أقصى عدد منتجات</label>
          <input type="number" min="1" max="24" value="${c.max_items||8}" oninput="S.editC.max_items=this.value"></div>
      </div>
      <div class="row">
        <div class="field"><label>يبدأ في (اختياري)</label>
          <input type="date" value="${dIn(c.starts_at)}" oninput="S.editC.starts_at=this.value"></div>
        <div class="field"><label>ينتهي في (اختياري)</label>
          <input type="date" value="${dIn(c.ends_at)}" oninput="S.editC.ends_at=this.value"></div>
      </div>
      ${c.kind==="best_sellers"?`<div class="note">تحذير: لسه مفيش مبيعات كافية مسجّلة في النظام
        (٣٦ سطر بس)، فالترتيب التلقائي ده هيبقى عشوائي تقريبًا. الأفضل دلوقتي تختار المنتجات بنفسك،
        وتحوّله تلقائي لما المبيعات تتسجّل بانتظام.</div>`:""}
      ${manual?`<div class="field"><label>اختار المنتجات (${c.product_ids.length} مختار)</label>
        ${picker(c.product_ids,"toggleC","c")}</div>`:
        `<p class="muted">المجموعة دي بتتملي تلقائي — مش محتاجة اختيار يدوي.</p>`}
      <div class="actions" style="margin-top:14px">
        <button class="btn-primary" onclick="saveC()" ${S.busy?"disabled":""}>حفظ</button>
        <button class="btn-ghost" onclick="S.editC=null;render()">إلغاء</button>
      </div>
    </div>`;
  }
  return `
    <div class="actions" style="margin-bottom:14px">
      <button class="btn-primary" onclick="newC()">+ مجموعة جديدة</button>
    </div>
    ${cs.length? cs.map(c=>`
      <div class="card">
        <div class="head-row">
          <div>
            <h2>${esc(c.title_ar)} <span class="pill ${c.active?"on":"off"}">${c.active?"ظاهرة":"مخفية"}</span></h2>
            <p class="sub">${esc(c.subtitle_ar||"")}</p>
            <p class="muted" style="margin:6px 0 0">
              ${c.kind==="manual"?`${c.product_ids.length} منتج مختار يدويًا`:"بتتملي تلقائي"}
              · ترتيب ${c.sort}
              ${c.ends_at?` · تنتهي ${dIn(c.ends_at)}`:""}
            </p>
          </div>
          <div class="actions">
            <button class="btn-ghost" onclick="toggleActive('${c.id}',${!c.active})">${c.active?"إخفاء":"إظهار"}</button>
            <button class="btn-ghost" onclick="editC('${c.id}')">تعديل</button>
            <button class="btn-danger" onclick="delC('${c.id}','${esc(c.title_ar)}')">حذف</button>
          </div>
        </div>
      </div>`).join("")
      : `<div class="empty">مفيش مجموعات لسه — اضغط «مجموعة جديدة»</div>`}`;
}

function discountsTab(){
  const onSale = S.data.products.filter(p=>Number(p.live_pct)>0);
  const sel = S.discSel||[];
  return `
    <div class="card">
      <h2>خصم على تصنيف كامل</h2>
      <p class="sub">أسرع طريقة: اختار التصنيف والنسبة وتاريخ الانتهاء.</p>
      <div class="row" style="margin-top:12px">
        <div class="field"><label>التصنيف</label>
          <select id="dcat">${S.data.categories.map(c=>`<option>${esc(c)}</option>`).join("")}</select></div>
        <div class="field"><label>نسبة الخصم %</label>
          <input id="dpct" type="number" min="1" max="90" placeholder="مثلاً 25"></div>
        <div class="field"><label>ينتهي في</label><input id="dend" type="date"></div>
      </div>
      <div class="actions">
        <button class="btn-primary" onclick="applyCat()" ${S.busy?"disabled":""}>طبّق الخصم</button>
        <button class="btn-danger" onclick="clearCat()" ${S.busy?"disabled":""}>شيل الخصم عن التصنيف</button>
      </div>
    </div>

    <div class="card">
      <h2>خصم على منتجات محددة</h2>
      <div class="field" style="margin-top:10px">${picker(sel,"toggleD","d")}</div>
      <div class="row">
        <div class="field"><label>نسبة الخصم %</label>
          <input id="spct" type="number" min="1" max="90" placeholder="مثلاً 25"></div>
        <div class="field"><label>ينتهي في</label><input id="send" type="date"></div>
      </div>
      <div class="actions">
        <button class="btn-primary" onclick="applySel()" ${(!sel.length||S.busy)?"disabled":""}>
          طبّق على ${sel.length} منتج</button>
        <button class="btn-danger" onclick="clearSel()" ${(!sel.length||S.busy)?"disabled":""}>شيل الخصم</button>
      </div>
    </div>

    <div class="card">
      <h2>خصومات شغالة دلوقتي (${onSale.length})</h2>
      ${onSale.length? onSale.map(p=>`
        <div class="pick-row">
          <span class="pick-name">${esc(p.name)}</span>
          <span class="pill sale">-${Math.round(p.live_pct)}%</span>
          <span class="pick-meta">${money(p.price)} <s style="opacity:.55">${money(p.sell_price)}</s></span>
        </div>`).join("")
        : `<div class="empty">مفيش أي خصم شغال حاليًا</div>`}
    </div>`;
}

function bundlesTab(){
  if(S.editB){
    const b = S.editB;
    const ids = b.items.map(i=>i.product_id);
    const regular = b.items.reduce((s,i)=>{
      const p = S.data.products.find(x=>x.id===i.product_id);
      return s + (p ? Number(p.price)*Number(i.qty||1) : 0);
    },0);
    const save = regular - Number(b.bundle_price||0);
    return `<div class="card">
      <h2>${b.id?"تعديل باندل":"باندل جديد"}</h2>
      <div class="row">
        <div class="field"><label>الاسم بالعربي</label>
          <input value="${esc(b.title_ar)}" oninput="S.editB.title_ar=this.value"></div>
        <div class="field"><label>الاسم بالإنجليزي</label>
          <input value="${esc(b.title_en)}" oninput="S.editB.title_en=this.value"></div>
      </div>
      <div class="row">
        <div class="field"><label>سعر الباندل</label>
          <input type="number" value="${b.bundle_price||""}" oninput="S.editB.bundle_price=this.value;render()"></div>
        <div class="field"><label>ينتهي في (اختياري)</label>
          <input type="date" value="${dIn(b.ends_at)}" oninput="S.editB.ends_at=this.value"></div>
      </div>
      <div class="field"><label>منتجات الباندل (${ids.length})</label>${picker(ids,"toggleB","b")}</div>
      ${b.items.length?`<div class="chosen">${b.items.map(i=>{
        const p=S.data.products.find(x=>x.id===i.product_id);
        return `<span class="chip">${esc(p?p.name:"?")} ×${i.qty}
          <button onclick="bQty('${i.product_id}',1)">+</button>
          <button onclick="bQty('${i.product_id}',-1)">−</button></span>`;}).join("")}</div>`:""}
      ${b.items.length?`<p class="muted" style="margin-top:12px">
        السعر العادي ${money(regular)} · سعر الباندل ${money(b.bundle_price||0)} ·
        <strong style="color:${save>0?"var(--ok)":"var(--danger)"}">
        ${save>0?`العميلة بتوفّر ${money(save)}`:"الباندل مش أرخص من السعر العادي"}</strong></p>`:""}
      <div class="actions" style="margin-top:14px">
        <button class="btn-primary" onclick="saveB()" ${S.busy?"disabled":""}>حفظ</button>
        <button class="btn-ghost" onclick="S.editB=null;render()">إلغاء</button>
      </div>
    </div>`;
  }
  return `
    <div class="note">الباندل دلوقتي بيتعرض على الموقع بسعره وبيوضّح التوفير، لكن
      <strong>سعر الباندل لسه مش بيتطبّق تلقائيًا في السلة</strong> — لو العميلة ضافت
      المنتجات، هتتحاسب بالسعر العادي. ده الجزء المتبقّي وبيحتاج شغل دقيق على حساب
      الطلب. متعلنش باندل قبل ما نكمّله.</div>
    <div class="actions" style="margin-bottom:14px">
      <button class="btn-primary" onclick="newB()">+ باندل جديد</button>
    </div>
    ${S.data.bundles.length? S.data.bundles.map(b=>`
      <div class="card">
        <div class="head-row">
          <div>
            <h2>${esc(b.title_ar)} <span class="pill ${b.active?"on":"off"}">${b.active?"ظاهر":"مخفي"}</span></h2>
            <p class="muted">${b.items.length} منتج · ${money(b.bundle_price)}</p>
          </div>
          <div class="actions">
            <button class="btn-ghost" onclick="editB('${b.id}')">تعديل</button>
            <button class="btn-danger" onclick="delB('${b.id}','${esc(b.title_ar)}')">حذف</button>
          </div>
        </div>
      </div>`).join("")
      : `<div class="empty">مفيش باندلز لسه</div>`}`;
}

function render(){
  if(!S.data) return;
  const tabs = [["collections","المجموعات"],["discounts","الخصومات"],["bundles","الباندلز"]];
  $("#app").innerHTML = `
    <div class="tabs">${tabs.map(([k,l])=>
      `<button class="tab ${S.tab===k?"on":""}" onclick="S.tab='${k}';render()">${l}</button>`).join("")}</div>
    ${S.tab==="collections"?collectionsTab():S.tab==="discounts"?discountsTab():bundlesTab()}`;
}

/* ── actions ── */
function newC(){ S.editC={id:null,title_ar:"",title_en:"",subtitle_ar:"",subtitle_en:"",
  kind:"manual",sort:(S.data.collections.length+1),active:true,max_items:8,product_ids:[],starts_at:null,ends_at:null}; render(); }
function editC(id){ S.editC = JSON.parse(JSON.stringify(S.data.collections.find(c=>c.id===id))); render(); }
function toggleC(id){ const a=S.editC.product_ids; const i=a.indexOf(id);
  i>=0?a.splice(i,1):a.push(id); render(); }

async function guard(fn){
  if(S.busy) return; S.busy=true; render();
  try{ await fn(); await load(); }
  catch(e){ toast(e.message, true); S.busy=false; render(); return; }
  S.busy=false;
}
async function saveC(){
  const c=S.editC;
  if(!c.title_ar.trim()||!c.title_en.trim()) return toast("لازم تكتب العنوان بالعربي والإنجليزي", true);
  await guard(async()=>{ await rpc("shop_fn_save_collection",{p:c}); S.editC=null; toast("اتحفظت ✓"); });
}
async function toggleActive(id,val){
  const c=S.data.collections.find(x=>x.id===id);
  await guard(async()=>{ await rpc("shop_fn_save_collection",{p:{...c,active:val}});
    toast(val?"ظهرت على الموقع ✓":"اتخفت من الموقع ✓"); });
}
async function delC(id,name){
  if(!confirm(`متأكد إنك عايز تحذف «${name}»؟ ده مش هيحذف المنتجات نفسها.`)) return;
  await guard(async()=>{ await rpc("shop_fn_delete_collection",{p_id:id}); toast("اتحذفت ✓"); });
}

function toggleD(id){ S.discSel=S.discSel||[]; const i=S.discSel.indexOf(id);
  i>=0?S.discSel.splice(i,1):S.discSel.push(id); render(); }
async function applyCat(){
  const cat=$("#dcat").value, pct=Number($("#dpct").value), end=$("#dend").value;
  if(!pct||pct<1||pct>90) return toast("اكتب نسبة خصم بين 1 و 90", true);
  await guard(async()=>{ const r=await rpc("shop_fn_set_discount",
    {p_category:cat,p_percent:pct,p_starts_at:new Date().toISOString(),
     p_ends_at:end?new Date(end+"T23:59:59").toISOString():null});
    toast(`الخصم اتطبّق على ${r.updated} منتج ✓`); });
}
async function clearCat(){
  const cat=$("#dcat").value;
  if(!confirm(`تشيل الخصم عن كل منتجات «${cat}»؟`)) return;
  await guard(async()=>{ const r=await rpc("shop_fn_set_discount",{p_category:cat,p_percent:null});
    toast(`الخصم اتشال عن ${r.updated} منتج ✓`); });
}
async function applySel(){
  const pct=Number($("#spct").value), end=$("#send").value;
  if(!pct||pct<1||pct>90) return toast("اكتب نسبة خصم بين 1 و 90", true);
  await guard(async()=>{ const r=await rpc("shop_fn_set_discount",
    {p_product_ids:S.discSel,p_percent:pct,p_starts_at:new Date().toISOString(),
     p_ends_at:end?new Date(end+"T23:59:59").toISOString():null});
    S.discSel=[]; toast(`الخصم اتطبّق على ${r.updated} منتج ✓`); });
}
async function clearSel(){
  await guard(async()=>{ const r=await rpc("shop_fn_set_discount",{p_product_ids:S.discSel,p_percent:null});
    S.discSel=[]; toast(`الخصم اتشال عن ${r.updated} منتج ✓`); });
}

function newB(){ S.editB={id:null,title_ar:"",title_en:"",bundle_price:"",active:true,sort:0,items:[],ends_at:null}; render(); }
function editB(id){ S.editB=JSON.parse(JSON.stringify(S.data.bundles.find(b=>b.id===id))); render(); }
function toggleB(id){ const it=S.editB.items; const i=it.findIndex(x=>x.product_id===id);
  i>=0?it.splice(i,1):it.push({product_id:id,qty:1}); render(); }
function bQty(id,d){ const it=S.editB.items.find(x=>x.product_id===id);
  if(it){ it.qty=Math.max(1,Math.min(5,it.qty+d)); render(); } }
async function saveB(){
  const b=S.editB;
  if(!b.title_ar.trim()||!b.title_en.trim()) return toast("لازم تكتب الاسم بالعربي والإنجليزي", true);
  if(!Number(b.bundle_price)) return toast("اكتب سعر الباندل", true);
  if(b.items.length<2) return toast("الباندل لازم فيه منتجين على الأقل", true);
  await guard(async()=>{ await rpc("shop_fn_save_bundle",{p:b}); S.editB=null; toast("اتحفظ ✓"); });
}
async function delB(id,name){
  if(!confirm(`متأكد إنك عايز تحذف باندل «${name}»؟`)) return;
  await guard(async()=>{ await rpc("shop_fn_delete_bundle",{p_id:id}); toast("اتحذف ✓"); });
}

load();
</script>
